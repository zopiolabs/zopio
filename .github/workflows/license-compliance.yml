name: License Compliance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Mondays at 00:00 UTC
    - cron: '0 0 * * 1'

permissions:
  contents: read
  pull-requests: write

jobs:
  check-headers:
    name: Check License Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Check BSL headers in core files
        run: |
          echo "Checking BSL headers in core framework files..."
          missing_headers=0
          
          # Check TypeScript/JavaScript files in core directories
          for file in $(find apps packages cli -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" 2>/dev/null | grep -v node_modules | grep -v dist | grep -v .turbo); do
            if ! grep -q "Copyright (c) .* Zopio Inc." "$file"; then
              echo "❌ Missing header: $file"
              missing_headers=$((missing_headers + 1))
            fi
          done
          
          if [ $missing_headers -gt 0 ]; then
            echo "::error::Found $missing_headers files missing license headers"
            exit 1
          else
            echo "✅ All core files have proper license headers"
          fi
          
      - name: Check MIT headers in marketplace files
        run: |
          echo "Checking MIT headers in marketplace files..."
          missing_headers=0
          
          # Check TypeScript/JavaScript files in marketplace
          for file in $(find marketplace -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" 2>/dev/null | grep -v node_modules | grep -v dist); do
            if ! grep -q "MIT License\|Copyright (c)" "$file"; then
              echo "❌ Missing header: $file"
              missing_headers=$((missing_headers + 1))
            fi
          done
          
          if [ $missing_headers -gt 0 ]; then
            echo "::warning::Found $missing_headers marketplace files missing license headers"
          else
            echo "✅ All marketplace files have proper license headers"
          fi

  check-package-json:
    name: Check package.json License Fields
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Check license fields in package.json files
        run: |
          echo "Checking license fields in package.json files..."
          errors=0
          
          # Check core framework package.json files (should be BUSL-1.1)
          for file in $(find apps packages cli -name "package.json" -type f | grep -v node_modules); do
            if ! grep -q '"license": "BUSL-1.1"' "$file"; then
              echo "❌ Missing or incorrect license in: $file"
              errors=$((errors + 1))
            fi
          done
          
          # Check marketplace package.json files (should be MIT)
          for file in $(find marketplace -name "package.json" -type f | grep -v node_modules); do
            if ! grep -q '"license": "MIT"' "$file"; then
              echo "❌ Missing or incorrect license in: $file"
              errors=$((errors + 1))
            fi
          done
          
          if [ $errors -gt 0 ]; then
            echo "::error::Found $errors package.json files with missing or incorrect license fields"
            exit 1
          else
            echo "✅ All package.json files have correct license fields"
          fi

  dependency-license-check:
    name: Check Dependency Licenses
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Install license checker
        run: pnpm add -g license-checker
        
      - name: Check licenses
        run: |
          echo "Checking dependency licenses..."
          
          # Create allowed licenses list
          cat > allowed-licenses.json << EOF
          {
            "allowed": [
              "MIT",
              "ISC",
              "BSD-2-Clause",
              "BSD-3-Clause",
              "Apache-2.0",
              "CC0-1.0",
              "0BSD",
              "Unlicense",
              "Python-2.0",
              "BlueOak-1.0.0"
            ]
          }
          EOF
          
          # Run license checker
          license-checker --json --out licenses.json --excludePrivatePackages
          
          # Check for problematic licenses
          node -e "
          const licenses = require('./licenses.json');
          const allowed = require('./allowed-licenses.json').allowed;
          let errors = 0;
          
          for (const [pkg, info] of Object.entries(licenses)) {
            const license = info.licenses || 'UNKNOWN';
            if (!allowed.some(l => license.includes(l))) {
              console.error(\`❌ Problematic license in \${pkg}: \${license}\`);
              errors++;
            }
          }
          
          if (errors > 0) {
            console.error(\`::error::Found \${errors} dependencies with problematic licenses\`);
            process.exit(1);
          } else {
            console.log('✅ All dependencies have compatible licenses');
          }
          "

  license-file-check:
    name: Verify License Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Check required license files exist
        run: |
          echo "Checking required license files..."
          required_files=(
            "LICENSE"
            "CLA.md"
            "COPYRIGHT"
            "NOTICE"
            "marketplace/LICENSE"
            ".github/CONTRIBUTING.md"
          )
          
          errors=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              errors=$((errors + 1))
            else
              echo "✅ Found: $file"
            fi
          done
          
          if [ $errors -gt 0 ]; then
            echo "::error::Missing $errors required license files"
            exit 1
          fi
          
      - name: Verify marketplace LICENSE files
        run: |
          echo "Checking marketplace category LICENSE files..."
          categories=(
            "business-plugins"
            "developer-plugins"
            "embedded-apps"
            "fintech-plugins"
            "insurtech-plugins"
            "integrations"
          )
          
          errors=0
          for category in "${categories[@]}"; do
            if [ ! -f "marketplace/$category/LICENSE" ]; then
              echo "❌ Missing LICENSE in marketplace/$category/"
              errors=$((errors + 1))
            fi
          done
          
          if [ $errors -gt 0 ]; then
            echo "::error::Missing $errors marketplace LICENSE files"
            exit 1
          else
            echo "✅ All marketplace categories have LICENSE files"
          fi

  comment-results:
    name: Comment PR Results
    runs-on: ubuntu-latest
    needs: [check-headers, check-package-json, dependency-license-check, license-file-check]
    if: github.event_name == 'pull_request' && always()
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              headers: '${{ needs.check-headers.result }}',
              packageJson: '${{ needs.check-package-json.result }}',
              dependencies: '${{ needs.dependency-license-check.result }}',
              files: '${{ needs.license-file-check.result }}'
            };
            
            let comment = '## 📋 License Compliance Check\n\n';
            
            const statusIcon = (status) => status === 'success' ? '✅' : '❌';
            
            comment += `| Check | Status |\n`;
            comment += `|-------|--------|\n`;
            comment += `| License Headers | ${statusIcon(results.headers)} |\n`;
            comment += `| Package.json License Fields | ${statusIcon(results.packageJson)} |\n`;
            comment += `| Dependency Licenses | ${statusIcon(results.dependencies)} |\n`;
            comment += `| Required License Files | ${statusIcon(results.files)} |\n`;
            
            const allPassed = Object.values(results).every(r => r === 'success');
            
            if (allPassed) {
              comment += '\n✅ **All license compliance checks passed!**';
            } else {
              comment += '\n❌ **Some license compliance checks failed.** Please review the workflow logs for details.';
            }
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('License Compliance Check')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
name: "DCO Check"

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - name: Get PR Commits
        id: get-pr-commits
        uses: tim-actions/get-pr-commits@v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: DCO Check
        uses: tim-actions/dco@v1.1.0
        with:
          commits: ${{ steps.get-pr-commits.outputs.commits }}
          
      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.name,
              body: `⚠️ **DCO Check Failed**
              
              This pull request has commits that are not signed off. Please ensure all commits include a sign-off statement:
              
              \`\`\`
              Signed-off-by: Your Name <your-email@example.com>
              \`\`\`
              
              You can add sign-offs to your commits using:
              \`\`\`bash
              git commit -s -m "Your commit message"
              \`\`\`
              
              For existing commits, you can amend them:
              \`\`\`bash
              git commit --amend -s --no-edit
              git push --force-with-lease
              \`\`\`
              
              Note: As an alternative to DCO, you can also sign our CLA. See [CONTRIBUTING.md](/.github/CONTRIBUTING.md) for details.`
            })